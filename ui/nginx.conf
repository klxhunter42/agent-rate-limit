worker_processes auto;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 10000;
    reset_timedout_connection on;
    client_body_timeout 10;
    send_timeout 5;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/manifest+json
        application/vnd.ms-fontobject
        font/opentype
        font/ttf
        font/woff
        font/woff2
        image/svg+xml
        image/x-icon;

    # static file descriptor cache
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors off;

    server {
        listen 8080;
        root /usr/share/nginx/html;
        index index.html;
        server_tokens off;

        # security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }

        # html - short cache, must revalidate
        location = /index.html {
            try_files $uri =404;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }

        # vite hashed assets - aggressive cache (1 year)
        location /assets/ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            gzip_static on;
        }

        # static file extensions with content hashes
        location ~* \.(js|css|svg|png|jpg|jpeg|gif|ico|woff|woff2|ttf|eot|otf|webp|avif|webm)$ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            gzip_static on;
        }

        # manifest / service worker
        location ~* \.(manifest|webmanifest|json)$ {
            try_files $uri =404;
            add_header Cache-Control "no-cache" always;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # proxy to gateway
        location /v1/ {
            proxy_pass http://arl-gateway:8080/v1/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 300s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_buffering off;

            # SSE support
            proxy_set_header Accept-Encoding "";
            chunked_transfer_encoding on;
        }

        location /health {
            proxy_pass http://arl-gateway:8080/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Connection "";
        }

        location /metrics {
            proxy_pass http://arl-gateway:8080/metrics;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Connection "";
        }

        # block sensitive files
        location ~ /\.(?!well-known) {
            deny all;
            return 404;
        }
    }
}
